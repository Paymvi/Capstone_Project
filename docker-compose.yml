services:
  db:
    image: postgres:15
    container_name: roamie_db
    restart: always
    environment:
      POSTGRES_USER: roamie_user
      POSTGRES_PASSWORD: roamie_pass
      POSTGRES_DB: roamie
    ports:
      - "5432:5432"
    volumes:
      - roamie_db_data:/var/lib/postgresql/data
      - ./schema.sql:/docker-entrypoint-initdb.d/schema.sql

volumes:
  roamie_db_data: